server {
    listen 80;
    listen [::]:80;
    server_name audit-report-generator.dev;

    # Set file upload limit (needed for audit image attachments)
    client_max_body_size 50M;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml;

    location / {
        # Proxy to Next.js production server running on PM2 (Port 3000)
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # Headers for WebSockets/Server-Sent Events connection upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable proxy buffering for server responses
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
